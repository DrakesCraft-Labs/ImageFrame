name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: imageframe-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Test y build 1.21.11
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verificar reactor completo
        run: mvn --batch-mode --no-transfer-progress clean verify

      - name: Validar JAR de producción
        shell: bash
        run: |
          JAR="$(find common/target -maxdepth 1 -type f -name 'ImageFrame-*.jar' ! -name 'original-*' ! -name '*-sources.jar' | head -n 1)"
          test -n "$JAR"
          jar tf "$JAR" | grep -q '^com/loohp/imageframe/ImageFrame.class$'
          jar tf "$JAR" | grep -q '^com/loohp/imageframe/nms/V1_21_11.class$'
          javap -classpath "$JAR" -c com.loohp.imageframe.utils.ImageFilledMapUtils | grep -q 'hasMapView'
          echo "JAR=$JAR" >> "$GITHUB_ENV"

      - name: Publicar JAR
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ImageFrame-${{ github.sha }}
          path: ${{ env.JAR }}
          if-no-files-found: error
          retention-days: 14
